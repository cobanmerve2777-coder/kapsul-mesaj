<h2>Kayıt Ol</h2>

{% if messages %}
  {% for message in messages %}
    <p>{{ message }}</p>
  {% endfor %}
{% endif %}

<form method="post">
  {% csrf_token %}
  <input name="username" placeholder="Kullanıcı adı"><br><br>
  <input name="password1" type="password" placeholder="Şifre"><br><br>
  <input name="password2" type="password" placeholder="Şifre tekrar"><br><br>
  <button type="submit">Kayıt Ol</button>
</form>

<br>
<a href="{% url 'login' %}">Giriş Yap</a>
