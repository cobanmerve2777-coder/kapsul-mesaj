{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kapsül Mesaj | Mesaj Oluştur</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;outline:none;}
html, body {overflow-x: hidden;}

:root{
--bg-color:#0d0f1a;
--text-main:#fff;
--text-muted:rgba(255,255,255,0.7);
--card-bg:rgba(255,255,255,0.03);
--input-border:rgba(255,255,255,0.1);
}

body{
font-family:'Inter',sans-serif;
background:var(--bg-color);
color:var(--text-main);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

.bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
opacity:0.6;
}

.overlay{
position:fixed;
inset:0;
background:radial-gradient(circle, transparent 0%, var(--bg-color) 100%);
z-index:-1;
}

.container{
width:100%;
max-width:1100px;
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
align-items:center;
}

.hero-text h1{
font-size:68px;
font-weight:900;
margin-bottom:20px;
}

.hero-text p{
color:var(--text-muted);
font-size:18px;
}

.form-card{
background:var(--card-bg);
border:1px solid var(--input-border);
border-radius:24px;
padding:40px;
}

.input-group{margin-bottom:18px;}

input, textarea{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid var(--input-border);
background:rgba(255,255,255,0.05);
color:white;
}

.file-box{
border:2px dashed var(--input-border);
padding:18px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

.file-box input{display:block;margin-top:10px;}

/* 🚀 BUTTON (HOVER GLOW EKLENDİ) */
.btn-submit{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg, #8b5cf6, #6d28d9);
color:white;
font-weight:700;
cursor:pointer;
position:relative;
overflow:hidden;
transition:0.3s ease;
}

/* ✨ HOVER GLOW EFFECT */
.btn-submit:hover{
transform:translateY(-2px);
box-shadow:0 0 18px rgba(139, 92, 246, 0.7),
           0 0 40px rgba(109, 40, 217, 0.4);
}

/* logout */
.logout-btn{
position: fixed;
top: 20px;
right: 20px;
padding: 10px 18px;
border-radius: 12px;
font-size: 13px;
font-weight: 700;
text-decoration: none;
color: white;
background: rgba(255,255,255,0.05);
border: 1px solid var(--input-border);
backdrop-filter: blur(10px);
transition: 0.3s;
z-index: 10;
}

.logout-btn:hover{
background: rgba(255,255,255,0.1);
transform: translateY(-2px);
}

@media(max-width:768px){
.container{grid-template-columns:1fr;gap:30px;}
.hero-text h1{font-size:36px;text-align:center;}
.hero-text p{text-align:center;}
.form-card{padding:20px;}

.logout-btn{
top:15px;
right:15px;
padding:8px 14px;
font-size:12px;
}
}
</style>
</head>

<body>

{% if user.is_authenticated %}
<a href="{% url 'logout' %}" class="logout-btn">Çıkış</a>
{% endif %}

<video autoplay muted loop playsinline class="bg-video">
<source src="{% static 'videos/slow.mp4' %}" type="video/mp4">
</video>

<div class="overlay"></div>

<main class="container">

<section class="hero-text">
<h1>Geleceğe Mesaj</h1>
<p>Kapsül mesaj oluştur</p>
</section>

<section class="form-card">

{% if messages %}
{% for message in messages %}
<div style="margin-bottom:10px;padding:10px;background:#ff4d4d20;border-radius:10px;">
{{ message }}
</div>
{% endfor %}
{% endif %}

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="input-group">
<input type="text" name="baslik" placeholder="Başlık" required>
</div>

<div class="input-group">
<input type="email" name="alici_email" placeholder="E-posta" required>
</div>

<div class="input-group">
<input type="datetime-local" name="acilma_tarihi" required>
</div>

<div class="input-group file-box">
📎 Fotoğraf seç
<input type="file" name="foto" accept="image/*">
</div>

<div class="input-group">
🎤 Ses Kaydı

<div style="display:flex; gap:10px; margin-top:10px;">
<button type="button" id="recordBtn" class="btn-submit" style="background:#3c3b3c;">Kayda Başla</button>
<button type="button" id="stopBtn" class="btn-submit" style="background:#444;" disabled>Durdur</button>
</div>

<audio id="audioPlayer" controls style="margin-top:10px; width:100%;"></audio>

<input type="hidden" name="audio_data" id="audioData">
</div>

<div class="input-group">
<textarea name="icerik" placeholder="Mesaj" required></textarea>
</div>

<button type="submit" class="btn-submit">Gönder</button>

</form>
</section>

</main>

<script>
let mediaRecorder;
let audioChunks = [];

const recordBtn = document.getElementById("recordBtn");
const stopBtn = document.getElementById("stopBtn");
const audioPlayer = document.getElementById("audioPlayer");
const audioInput = document.getElementById("audioData");

recordBtn.onclick = async () => {
try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    let options = { mimeType: 'audio/webm' };

    if (!MediaRecorder.isTypeSupported('audio/webm')) {
        options = { mimeType: 'audio/mp4' };
    }

    mediaRecorder = new MediaRecorder(stream, options);
    audioChunks = [];

    mediaRecorder.ondataavailable = e => {
        audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
        const url = URL.createObjectURL(blob);
        audioPlayer.src = url;

        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = () => {
            audioInput.value = reader.result;
        };
    };

    mediaRecorder.start();
    recordBtn.disabled = true;
    stopBtn.disabled = false;

} catch (err) {
    alert("Mikrofon izni verilmedi veya cihaz desteklemiyor!");
}
};

stopBtn.onclick = () => {
mediaRecorder.stop();
recordBtn.disabled = false;
stopBtn.disabled = true;
};
</script>

</body>
</html>
